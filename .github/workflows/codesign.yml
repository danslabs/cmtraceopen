name: "CMTrace Open: Windows Signed Release"

on:
  push:
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"
      - "!*.*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (for example 0.1.1 or v0.1.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-windows-release:
    name: Prepare Windows Release
    runs-on: windows-latest
    outputs:
      version: ${{ steps.resolve_version.outputs.version }}
      tag_name: ${{ steps.resolve_version.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve release version
        id: resolve_version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $rawVersion = "${{ inputs.version }}"
          } else {
            $rawVersion = "${{ github.ref_name }}"
          }

          $normalizedVersion = $rawVersion.Trim()
          if ($normalizedVersion.StartsWith("v")) {
            $normalizedVersion = $normalizedVersion.Substring(1)
          }

          if (-not $normalizedVersion) {
            throw "Could not determine a release version."
          }

          $tagName = "v$normalizedVersion"

          "version=$normalizedVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate version consistency
        shell: pwsh
        env:
          VERSION: ${{ steps.resolve_version.outputs.version }}
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoVersion = $null
          $inPackageSection = $false
          foreach ($line in Get-Content src-tauri/Cargo.toml) {
            if ($line -match '^\[package\]\s*$') {
              $inPackageSection = $true
              continue
            }

            if ($inPackageSection -and $line -match '^\[') {
              break
            }

            if ($inPackageSection -and $line -match '^version\s*=\s*"([^"]+)"\s*$') {
              $cargoVersion = $Matches[1]
              break
            }
          }

          $versions = @{
            package = $packageVersion
            tauri = $tauriVersion
            cargo = $cargoVersion
            workflow = $env:VERSION
          }

          $mismatches = $versions.GetEnumerator() | Where-Object { $_.Value -ne $env:VERSION }
          if ($mismatches) {
            $details = ($versions.GetEnumerator() | ForEach-Object { "{0}={1}" -f $_.Key, $_.Value }) -join ", "
            throw "Version mismatch detected: $details"
          }

      - name: Create release tag for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.resolve_version.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          $tagExists = git rev-parse --verify --quiet "refs/tags/$env:TAG_NAME"
          if (-not $tagExists) {
            git tag $env:TAG_NAME
            git push origin $env:TAG_NAME
          }

      - name: Ensure GitHub release exists
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.resolve_version.outputs.tag_name }}
        run: |
          $releaseTitle = "CMTrace Open $env:TAG_NAME"
          $releaseNotes = @"
          ## CMTrace Open $env:TAG_NAME

          Open-source CMTrace log viewer with built-in Intune diagnostics.

          ### Windows Downloads
          | File | Description |
          |------|-------------|
          | `CMTrace-Open_VERSION_ARCH.msi` | MSI installer (includes Full + Lite) |
          | `CMTrace-Open_VERSION_ARCH.exe` | Standalone full edition |
          | `CMTrace-Open-Lite_VERSION_ARCH.exe` | Standalone lite edition |
          "@

          $releaseExists = $false
          for ($attempt = 1; $attempt -le 12; $attempt++) {
            gh release view $env:TAG_NAME *> $null
            if ($LASTEXITCODE -eq 0) {
              $releaseExists = $true
              break
            }

            Start-Sleep -Seconds 10
          }

          if (-not $releaseExists) {
            gh release create $env:TAG_NAME --title $releaseTitle --notes $releaseNotes *> $null
            if ($LASTEXITCODE -ne 0) {
              gh release view $env:TAG_NAME *> $null
              if ($LASTEXITCODE -ne 0) {
                throw "GitHub release $env:TAG_NAME was not available and could not be created."
              }
            }
          }

  windows-signed-release:
    name: Signed Windows Release (${{ matrix.label }})
    needs: prepare-windows-release
    runs-on: windows-latest
    environment: codesigning
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows-x64
            rust_target: x86_64-pc-windows-msvc
            artifact_suffix: x64
          - label: Windows-arm64
            rust_target: aarch64-pc-windows-msvc
            artifact_suffix: arm64

    env:
      VERSION: ${{ needs.prepare-windows-release.outputs.version }}
      TAG_NAME: ${{ needs.prepare-windows-release.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install frontend dependencies
        run: npm ci

      # ── Build application binaries (compile only, no bundling yet) ──
      - name: Build full edition EXE (compile only)
        run: npx tauri build --target ${{ matrix.rust_target }} --no-bundle

      - name: Build lite edition EXE (compile only)
        run: npx tauri build --target ${{ matrix.rust_target }} --no-bundle --config src-tauri/tauri.lite.conf.json -- --no-default-features

      # ── Sign application binaries BEFORE bundling ──
      # This ensures the EXEs inside NSIS and MSI installers are signed,
      # not just the outer installer packages. Fixes issue #74 where
      # ASR rules block unsigned binaries after installation.
      - name: Collect app binaries for code signing
        id: collect_binaries
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "src-tauri\target\${{ matrix.rust_target }}\release"
          $signDir = Join-Path $PWD "sign-prebundle"
          New-Item -ItemType Directory -Force -Path $signDir | Out-Null
          Copy-Item (Join-Path $releaseDir "CMTrace Open.exe") $signDir -Force
          Copy-Item (Join-Path $releaseDir "CMTrace Open Lite.exe") $signDir -Force
          "sign_dir=$signDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Sign application binaries
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.SIGNING_PROFILE_NAME }}
          files-folder: ${{ steps.collect_binaries.outputs.sign_dir }}
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Replace binaries with signed versions
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "src-tauri\target\${{ matrix.rust_target }}\release"
          $signDir = "${{ steps.collect_binaries.outputs.sign_dir }}"
          Copy-Item (Join-Path $signDir "CMTrace Open.exe") $releaseDir -Force
          Copy-Item (Join-Path $signDir "CMTrace Open Lite.exe") $releaseDir -Force

      # ── Build NSIS installer (bundles the already-signed binary) ──
      - name: Build NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.rust_target }} --bundles nsis

      # ── Stage all release artifacts ──
      - name: Stage release artifacts
        id: stage_artifacts
        shell: pwsh
        run: |
          $releaseDir = Join-Path $PWD "src-tauri\target\${{ matrix.rust_target }}\release"
          $bundleNsisDir = Join-Path $releaseDir "bundle\nsis"
          $artifactDir = Join-Path $PWD "release-artifacts"

          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          # Find the full edition EXE
          $fullExeCandidates = Get-ChildItem -Path $releaseDir -Filter "CMTrace Open.exe" -File
          if ($fullExeCandidates.Count -eq 0) {
            $fullExeCandidates = Get-ChildItem -Path $releaseDir -Filter *.exe -File |
              Where-Object {
                $_.DirectoryName -eq $releaseDir -and
                $_.Name -notmatch '(?i)(setup|updater|uninstall|nsis|lite)'
              }
          }
          if ($fullExeCandidates.Count -lt 1) {
            throw "Could not find full edition EXE in $releaseDir"
          }

          # Find the lite edition EXE
          $liteExeCandidates = Get-ChildItem -Path $releaseDir -Filter "CMTrace Open Lite.exe" -File
          if ($liteExeCandidates.Count -eq 0) {
            $liteExeCandidates = Get-ChildItem -Path $releaseDir -Filter *.exe -File |
              Where-Object {
                $_.DirectoryName -eq $releaseDir -and
                $_.Name -match '(?i)lite'
              }
          }
          if ($liteExeCandidates.Count -lt 1) {
            throw "Could not find lite edition EXE in $releaseDir"
          }

          # Find NSIS setup installer
          $nsisCandidates = Get-ChildItem -Path $bundleNsisDir -Filter *-setup.exe -File -Recurse
          if ($nsisCandidates.Count -ne 1) {
            $names = ($nsisCandidates | ForEach-Object { $_.FullName }) -join ", "
            throw "Expected exactly one NSIS setup EXE in $bundleNsisDir. Found: $names"
          }

          # Stage with release naming
          $stagedFullExe = Join-Path $artifactDir "CMTrace-Open_$($env:VERSION)_${{ matrix.artifact_suffix }}.exe"
          $stagedLiteExe = Join-Path $artifactDir "CMTrace-Open-Lite_$($env:VERSION)_${{ matrix.artifact_suffix }}.exe"
          $stagedNsis = Join-Path $artifactDir "CMTrace-Open_$($env:VERSION)_${{ matrix.artifact_suffix }}-setup.exe"

          Copy-Item $fullExeCandidates[0].FullName $stagedFullExe -Force
          Copy-Item $liteExeCandidates[0].FullName $stagedLiteExe -Force
          Copy-Item $nsisCandidates[0].FullName $stagedNsis -Force

          "full_exe_path=$stagedFullExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "lite_exe_path=$stagedLiteExe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "nsis_path=$stagedNsis" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── Sign NSIS outer installer ──
      - name: Sign NSIS installer
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.SIGNING_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\release-artifacts
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      # ── Build MSI via Master Packager Dev (bundles signed full + lite EXEs) ──
      - name: Install Master Packager Dev
        shell: pwsh
        run: |
          $installer = "$env:TEMP\mpdev.msi"
          Invoke-WebRequest -Uri "https://cdn.masterpackager.com/installer/dev/2.1.1/mpdev_self_contained_x64_2.1.1.msi" -OutFile $installer
          Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /quiet /norestart" -Wait
          "C:\Program Files\Master Packager Ltd\Master Packager Dev" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build MSI with mpdev
        shell: pwsh
        env:
          FULL_EXE_PATH: ${{ steps.stage_artifacts.outputs.full_exe_path }}
          LITE_EXE_PATH: ${{ steps.stage_artifacts.outputs.lite_exe_path }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SIGNING_ENDPOINT: ${{ secrets.SIGNING_ENDPOINT }}
          SIGNING_ACCOUNT_NAME: ${{ secrets.SIGNING_ACCOUNT_NAME }}
          SIGNING_PROFILE_NAME: ${{ secrets.SIGNING_PROFILE_NAME }}
        run: |
          mpdev build src-tauri\installer\package.signed.json `
            --working-dir "${{ github.workspace }}" `
            --properties `
              "$.version=$env:VERSION" `
              "$.outputFileName=CMTrace-Open_$($env:VERSION)_${{ matrix.artifact_suffix }}" `
              "$.platform=${{ matrix.artifact_suffix }}"

      - name: Verify MSI output
        id: verify_msi
        shell: pwsh
        run: |
          $msiPath = Join-Path $PWD "release-artifacts\CMTrace-Open_$($env:VERSION)_${{ matrix.artifact_suffix }}.msi"
          if (-not (Test-Path $msiPath)) {
            throw "Expected MSI not found at $msiPath"
          }
          "msi_path=$msiPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ── Generate updater signature for NSIS installer ──
      - name: Generate updater signature for NSIS installer
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NSIS_PATH: ${{ steps.stage_artifacts.outputs.nsis_path }}
        run: |
          npx tauri signer sign "$env:NSIS_PATH"
          $sigPath = "$env:NSIS_PATH.sig"
          if (-not (Test-Path $sigPath)) {
            throw "Updater signature file was not generated at $sigPath"
          }
          Write-Host "Generated updater signature: $sigPath"

      # ── Upload artifacts ──
      - name: Upload signed workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cmtrace-open-windows-signed-${{ matrix.artifact_suffix }}-${{ env.VERSION }}
          path: |
            ${{ steps.stage_artifacts.outputs.full_exe_path }}
            ${{ steps.stage_artifacts.outputs.lite_exe_path }}
            ${{ steps.verify_msi.outputs.msi_path }}
            ${{ steps.stage_artifacts.outputs.nsis_path }}
          if-no-files-found: error

      - name: Publish signed Windows assets to GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FULL_EXE_PATH: ${{ steps.stage_artifacts.outputs.full_exe_path }}
          LITE_EXE_PATH: ${{ steps.stage_artifacts.outputs.lite_exe_path }}
          MSI_PATH: ${{ steps.verify_msi.outputs.msi_path }}
          NSIS_PATH: ${{ steps.stage_artifacts.outputs.nsis_path }}
        run: |
          gh release upload $env:TAG_NAME $env:FULL_EXE_PATH $env:LITE_EXE_PATH $env:MSI_PATH $env:NSIS_PATH --clobber

      - name: Update latest.json with Windows platform entry
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NSIS_PATH: ${{ steps.stage_artifacts.outputs.nsis_path }}
        run: |
          $nsisFileName = Split-Path $env:NSIS_PATH -Leaf
          $sigContent = Get-Content "$env:NSIS_PATH.sig" -Raw
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/$nsisFileName"

          # Map artifact suffix to Tauri platform key
          $platformKey = if ("${{ matrix.artifact_suffix }}" -eq "x64") { "windows-x86_64" } else { "windows-aarch64" }

          $platformEntry = @{
            signature = $sigContent.Trim()
            url       = $downloadUrl
            version   = "v$env:VERSION"
          }

          # Try to download existing latest.json from the release (may have been uploaded by macOS/Linux workflow)
          $latestJsonPath = Join-Path $PWD "latest.json"
          $existing = $null

          for ($attempt = 1; $attempt -le 6; $attempt++) {
            try {
              gh release download $env:TAG_NAME --pattern "latest.json" --dir $PWD --clobber 2>$null
              if (Test-Path $latestJsonPath) {
                $existing = Get-Content $latestJsonPath -Raw | ConvertFrom-Json
                break
              }
            } catch { }
            Start-Sleep -Seconds 10
          }

          if (-not $existing) {
            # Create new latest.json
            $existing = [PSCustomObject]@{
              version   = "v$env:VERSION"
              notes     = "CMTrace Open v$env:VERSION"
              pub_date  = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
              platforms = @{}
            }
          }

          # Ensure platforms is a hashtable we can add to
          if ($existing.platforms -is [PSCustomObject]) {
            $platformsHash = @{}
            $existing.platforms.PSObject.Properties | ForEach-Object { $platformsHash[$_.Name] = $_.Value }
            $existing.platforms = $platformsHash
          }

          $existing.platforms[$platformKey] = $platformEntry
          $existing | ConvertTo-Json -Depth 10 | Set-Content $latestJsonPath -Encoding utf8

          gh release upload $env:TAG_NAME $latestJsonPath --clobber
