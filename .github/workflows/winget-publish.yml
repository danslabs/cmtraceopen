name: "CMTrace Open: Publish to winget"

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to test (e.g. v1.5.0)"
        required: true

permissions: {}

jobs:
  winget:
    name: Update winget package
    runs-on: windows-latest
    environment: release
    permissions: {}
    steps:
      - name: Install komac
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/russellbanks/Komac/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match "^komac-\d.*x86_64.*windows.*\.exe$" -and $_.name -notlike "*setup*" } | Select-Object -First 1
          if (-not $asset) { throw "Could not find Komac portable exe in latest release" }
          Write-Host "Downloading $($asset.name) from $($release.tag_name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile komac.exe
          $komacDir = "$env:RUNNER_TEMP\komac"
          New-Item -ItemType Directory -Path $komacDir -Force | Out-Null
          Move-Item -Path .\komac.exe -Destination "$komacDir\komac.exe"
          $komacDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Derive version and URLs
        id: release
        shell: pwsh
        env:
          TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          $version = $env:TAG_NAME -replace '^v', ''
          $base = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME"

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "url_x64_exe=$base/CMTrace-Open_${version}_x64.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "url_arm64_exe=$base/CMTrace-Open_${version}_arm64.exe" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "url_x64_msi=$base/CMTrace-Open_${version}_x64.msi" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "url_arm64_msi=$base/CMTrace-Open_${version}_arm64.msi" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Submit to winget-pkgs
        shell: pwsh
        env:
          KOMAC_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          komac update AdamGell.CMTraceOpen `
            --version ${{ steps.release.outputs.version }} `
            --urls ${{ steps.release.outputs.url_x64_exe }} `
                   ${{ steps.release.outputs.url_arm64_exe }} `
                   ${{ steps.release.outputs.url_x64_msi }} `
                   ${{ steps.release.outputs.url_arm64_msi }} `
            --submit
